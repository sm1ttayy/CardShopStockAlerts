name: TCG Restock Watcher

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may add 5-15 min of delay at busy times)
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write             # to commit state.json back

concurrency:
  group: watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ONE_PIECE: ${{ secrets.DISCORD_WEBHOOK_ONE_PIECE }}
          DISCORD_WEBHOOK_POKEMON: ${{ secrets.DISCORD_WEBHOOK_POKEMON }}
          DISCORD_WEBHOOK_RIFTBOUND: ${{ secrets.DISCORD_WEBHOOK_RIFTBOUND }}
          DISCORD_WEBHOOK_MTG: ${{ secrets.DISCORD_WEBHOOK_MTG }}
        run: python watcher.py

      - name: Persist state
        run: |
          git config user.name "restock-watcher"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || { git commit -m "update watcher state [skip ci]"; git push; }
