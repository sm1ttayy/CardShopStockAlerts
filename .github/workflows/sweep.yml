name: Daily Catalog Sweep

on:
  schedule:
    - cron: "23 9 * * *"    # once a day, 09:23 UTC (early morning US)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watcher            # shares the group with the 15-min watcher so the
  cancel-in-progress: false # two never race on state.json commits

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run full-catalog sweep
        env:
          WATCHER_PROFILE: cloud
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ONE_PIECE: ${{ secrets.DISCORD_WEBHOOK_ONE_PIECE }}
          DISCORD_WEBHOOK_POKEMON: ${{ secrets.DISCORD_WEBHOOK_POKEMON }}
          DISCORD_WEBHOOK_RIFTBOUND: ${{ secrets.DISCORD_WEBHOOK_RIFTBOUND }}
          DISCORD_WEBHOOK_MTG: ${{ secrets.DISCORD_WEBHOOK_MTG }}
        run: |
          python watcher.py --sweep
          python watcher.py --digest

      - name: Persist state
        run: |
          git config user.name "restock-watcher"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          # commit first (rebase refuses unstaged changes), then rebase onto
          # anything pushed mid-run; -X theirs keeps our just-computed state
          git diff --staged --quiet || { git commit -m "update sweep state [skip ci]"; git pull --rebase -X theirs; git push; }
